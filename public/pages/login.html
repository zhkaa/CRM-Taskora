<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Taskora — Вход</title>
  <link rel="stylesheet" href="/css/style.css" />
  <style>
    .auth-wrap {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      background: var(--bg);
      position: relative;
      overflow: hidden;
    }
    .auth-wrap::before {
      content: '';
      position: absolute;
      top: -200px; left: 50%;
      transform: translateX(-50%);
      width: 600px; height: 600px;
      background: radial-gradient(circle, rgba(124,106,247,0.12) 0%, transparent 70%);
      pointer-events: none;
    }
    .auth-box {
      width: 100%;
      max-width: 420px;
      position: relative;
      z-index: 1;
    }
    .auth-logo {
      display: flex;
      align-items: center;
      gap: 10px;
      font-family: var(--font-display);
      font-size: 24px;
      font-weight: 800;
      color: var(--text);
      text-decoration: none;
      margin-bottom: 40px;
      justify-content: center;
    }
    .auth-logo .logo-dot {
      width: 10px; height: 10px;
      background: var(--accent);
      border-radius: 50%;
      box-shadow: 0 0 14px var(--accent);
    }
    .auth-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 36px;
    }
    .auth-title {
      font-family: var(--font-display);
      font-size: 24px;
      font-weight: 800;
      margin-bottom: 6px;
    }
    .auth-sub {
      font-size: 14px;
      color: var(--text3);
      margin-bottom: 28px;
    }
    .auth-error {
      display: none;
      color: var(--red);
      font-size: 13px;
      padding: 10px 14px;
      background: var(--red-bg);
      border-radius: var(--radius);
      border: 1px solid rgba(248,113,113,0.2);
      margin-bottom: 16px;
    }
    .auth-footer {
      text-align: center;
      margin-top: 20px;
      font-size: 14px;
      color: var(--text3);
    }
    .auth-footer a {
      color: var(--accent);
      text-decoration: none;
      font-weight: 500;
    }
    .auth-footer a:hover { text-decoration: underline; }
  </style>
</head>
<body>
<div class="auth-wrap">
  <div class="auth-box">
    <a href="/" class="auth-logo">
      <span class="logo-dot"></span>Taskora
    </a>

    <div class="auth-card">
      <div class="auth-title">Рады вас видеть</div>
      <div class="auth-sub">Войдите в свою учетную запись Taskora</div>

      <div class="auth-error" id="authError"></div>

      <form class="form-stack" id="loginForm">
        <div class="form-group">
          <label class="form-label">Имя пользователя</label>
          <input class="form-input" type="text" id="username" placeholder="имя пользователя" required autofocus />
        </div>
        <div class="form-group">
          <label class="form-label">Пароль</label>
          <input class="form-input" type="password" id="password" placeholder="••••••••" required />
        </div>
        <button type="submit" class="btn btn-primary" style="width:100%;justify-content:center;margin-top:4px" id="loginBtn">
          Войти
        </button>
      </form>
    </div>

    <div class="auth-footer">
      Нет аккаунта?
      <a href="/register">Создать</a>
      &nbsp;·&nbsp;
      <a href="/">На главную</a>
    </div>
  </div>
</div>

<div class="toast-container"></div>
<script src="/js/utils.js"></script>
<script>
redirectIfAuth();

document.getElementById('loginForm').addEventListener('submit', async (e) => {
  e.preventDefault();
  const btn    = document.getElementById('loginBtn');
  const errEl  = document.getElementById('authError');
  errEl.style.display = 'none';
  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span> Вход...';

  const username = document.getElementById('username').value.trim();
  const password = document.getElementById('password').value;

  const res = await API.post('/api/login', { username, password });
  if (res.ok) {
    window.location.href = res.data.role === 'admin' ? '/admin' : '/dashboard';
  } else {
    errEl.textContent   = res.data.error || 'Неверное имя пользователя или пароль.';
    errEl.style.display = 'block';
    btn.disabled        = false;
    btn.innerHTML       = 'Войти';
  }
});
</script>
</body>
</html>
