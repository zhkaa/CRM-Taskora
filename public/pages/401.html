<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>401 — Не авторизован · Taskora</title>
  <link rel="stylesheet" href="/css/style.css" />
  <style>
    .error-page {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 40px 20px;
      background: var(--bg);
    }
    .error-code {
      font-family: var(--font-display);
      font-size: clamp(80px, 15vw, 160px);
      font-weight: 800;
      line-height: 1;
      letter-spacing: -0.04em;
      background: linear-gradient(135deg, var(--blue) 0%, #93c5fd 50%, transparent 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 8px;
      position: relative;
    }
    .error-code::after {
      content: '401';
      position: absolute;
      inset: 0;
      font-family: var(--font-display);
      font-size: inherit;
      font-weight: 800;
      letter-spacing: inherit;
      background: linear-gradient(135deg, var(--blue) 0%, #93c5fd 50%, transparent 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      filter: blur(40px);
      opacity: 0.3;
      z-index: -1;
    }
    .error-icon {
      width: 72px;
      height: 72px;
      background: var(--blue-bg);
      border: 1px solid rgba(96,165,250,0.3);
      border-radius: var(--radius-lg);
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 28px;
      font-size: 32px;
    }
    .error-title {
      font-family: var(--font-display);
      font-size: 28px;
      font-weight: 700;
      color: var(--text);
      margin-bottom: 12px;
    }
    .error-description {
      font-size: 15px;
      color: var(--text2);
      max-width: 400px;
      line-height: 1.6;
      margin-bottom: 36px;
    }
    .error-actions {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      justify-content: center;
    }
    .error-divider {
      width: 1px;
      height: 60px;
      background: linear-gradient(to bottom, transparent, rgba(96,165,250,0.4), transparent);
      margin: 0 auto 32px;
    }
  </style>
</head>
<body>
  <div class="error-page">
    <div class="error-icon">👤</div>
    <div class="error-code">401</div>
    <div class="error-divider"></div>
    <h1 class="error-title">Требуется авторизация</h1>
    <p class="error-description">
      Для доступа к этой странице необходимо войти в систему. Пожалуйста, авторизуйтесь.
    </p>
    <div class="error-actions">
      <a href="/login" class="btn btn-primary">
        <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4"/><polyline points="10 17 15 12 10 7"/><line x1="15" y1="12" x2="3" y2="12"/></svg>
        Войти в систему
      </a>
      <a href="/register" class="btn btn-ghost">
        <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><line x1="19" y1="8" x2="19" y2="14"/><line x1="22" y1="11" x2="16" y2="11"/></svg>
        Регистрация
      </a>
    </div>
  </div>
</body>
</html>
