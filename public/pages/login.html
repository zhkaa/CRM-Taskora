<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Taskora — Вход</title>
  <link rel="stylesheet" href="/css/style.css" />
  <style>
    .auth-features {
      display: flex; flex-direction: column; gap: 10px;
      margin-bottom: 28px;
    }
    .auth-feature {
      display: flex; align-items: center; gap: 10px;
      font-size: 13px; color: var(--text3); font-weight: 500;
    }
    .auth-feature-dot {
      width: 6px; height: 6px; border-radius: 50%;
      background: var(--accent); flex-shrink: 0;
      box-shadow: 0 0 6px var(--accent);
    }
  </style>
</head>
<body>
<div class="auth-wrap">
  <div class="auth-box">
    <a href="/" class="auth-logo">
      <span class="logo-dot"></span>Taskora
    </a>

    <div class="auth-card">
      <div class="auth-title">С возвращением</div>
      <div class="auth-sub">Войдите в свою учётную запись</div>

      <div class="auth-error" id="authError"></div>

      <form class="form-stack" id="loginForm">
        <div class="form-group">
          <label class="form-label">Имя пользователя</label>
          <input class="form-input" type="text" id="username" placeholder="введите имя пользователя" required autofocus />
        </div>
        <div class="form-group">
          <label class="form-label">Пароль</label>
          <input class="form-input" type="password" id="password" placeholder="введите пароль" required />
        </div>
        <button type="submit" class="btn btn-primary" style="width:100%;justify-content:center;margin-top:4px" id="loginBtn">
          Войти
        </button>
      </form>
    </div>

    <div class="auth-footer">
      Нет аккаунта?
      <a href="/register">Зарегистрироваться</a>
      &nbsp;·&nbsp;
      <a href="/">На главную</a>
    </div>
  </div>
</div>

<div class="toast-container"></div>
<script src="/js/utils.js"></script>
<script>
redirectIfAuth();

document.getElementById('loginForm').addEventListener('submit', async (e) => {
  e.preventDefault();
  const btn   = document.getElementById('loginBtn');
  const errEl = document.getElementById('authError');
  errEl.style.display = 'none';
  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span> Входим...';

  const username = document.getElementById('username').value.trim();
  const password = document.getElementById('password').value;

  const res = await API.post('/api/login', { username, password });
  if (res.ok) {
    window.location.href = res.data.role === 'admin' ? '/admin' : '/dashboard';
  } else {
    errEl.textContent   = res.data.error === 'Invalid credentials.'
      ? 'Неверное имя пользователя или пароль.'
      : (res.data.error || 'Ошибка входа. Попробуйте ещё раз.');
    errEl.style.display = 'block';
    btn.disabled        = false;
    btn.innerHTML       = 'Войти';
  }
});
</script>
</body>
</html>
